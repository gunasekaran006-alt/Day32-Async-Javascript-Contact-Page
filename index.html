<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="fake store users contact page">
    <title>User Profiles</title>

    <!-- Bootstrap CSS CDN-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        body{
            background-color: #f1f5f9;
        }

        #error-msg{
            display: none;
        }
    </style>

</head>

<body>

    <div class="container py-5">

        <!-- Page header -->
         <h1 class="text-center fw-bold mb-1">User Profiles</h1>
         <p class="text-center text-muted mb-5">Fetched live data from fakestore</p>

        <!-- Loading Spinner -->
         <div id="loading" class="text-center my-5">
            <div class="spinner-border text-primary"></div>
            <p>Loading users...</p>
         </div>

        <!-- Error Message -->
         <div id="error-msg" class="alert alert-danger text-center">Failed to load users data. Please try again</div>

        <!-- Cards container parent div -->
        <div id="user-container" class="row g-4"></div>

    </div>


    <script src="script.js"></script>
    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
